name: Admin MFA Regression

on:
  workflow_dispatch:
    inputs:
      api_url:
        description: API base URL to verify
        required: false
        default: https://api.telyx.ai

jobs:
  admin-mfa-regression:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install backend dependencies
        run: |
          cd backend
          npm install --production

      - name: Run admin MFA regression check
        env:
          API_URL: ${{ inputs.api_url }}
          TEST_ADMIN_EMAIL: ${{ secrets.TEST_ADMIN_EMAIL }}
          TEST_ADMIN_PASSWORD: ${{ secrets.TEST_ADMIN_PASSWORD }}
        run: |
          cd backend
          npm run security:admin-mfa-regression
