name: Promote Production

on:
  workflow_dispatch:
    inputs:
      source_ref:
        description: Branch or tag to promote to production
        required: true
        default: main

permissions:
  contents: write

jobs:
  promote:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Fetch source branch
        run: |
          git fetch --no-tags origin "${{ github.event.inputs.source_ref }}"
          echo "SOURCE_SHA=$(git rev-parse FETCH_HEAD)" >> "$GITHUB_ENV"

      - name: Fast-forward production branch
        run: |
          SOURCE_REF="${SOURCE_SHA}"

          if git ls-remote --exit-code --heads origin production; then
            git fetch origin production
            git checkout -B production origin/production
            git merge --ff-only "$SOURCE_REF"
          else
            git checkout -B production "$SOURCE_REF"
          fi

          git push origin production

      - name: Trigger Render production deploy
        env:
          RENDER_PRODUCTION_DEPLOY_HOOK_URL: ${{ secrets.RENDER_PRODUCTION_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RENDER_PRODUCTION_DEPLOY_HOOK_URL" ]; then
            echo "RENDER_PRODUCTION_DEPLOY_HOOK_URL secret is not set."
            exit 1
          fi

          curl --fail --show-error --silent \
            --request POST \
            "$RENDER_PRODUCTION_DEPLOY_HOOK_URL"

      - name: Promotion summary
        run: |
          echo "Promoted ${{ github.event.inputs.source_ref }} to production branch."
