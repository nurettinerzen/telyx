name: Sidebar Smoke

on:
  pull_request:
    paths:
      - 'frontend/components/Sidebar.jsx'
      - 'frontend/hooks/usePermissions.js'
      - 'frontend/lib/navigationConfig.js'
      - 'frontend/lib/navigationRegistry.mjs'
      - 'frontend/lib/rolePermissions.mjs'
      - 'frontend/lib/sidebarAccess.mjs'
      - 'frontend/tests/sidebar-smoke.test.mjs'
      - 'frontend/package.json'
      - 'frontend/package-lock.json'
  push:
    branches:
      - main
      - production
    paths:
      - 'frontend/components/Sidebar.jsx'
      - 'frontend/hooks/usePermissions.js'
      - 'frontend/lib/navigationConfig.js'
      - 'frontend/lib/navigationRegistry.mjs'
      - 'frontend/lib/rolePermissions.mjs'
      - 'frontend/lib/sidebarAccess.mjs'
      - 'frontend/tests/sidebar-smoke.test.mjs'
      - 'frontend/package.json'
      - 'frontend/package-lock.json'
  workflow_dispatch:

jobs:
  sidebar-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run sidebar smoke test
        run: npm run test:sidebar
